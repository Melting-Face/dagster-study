  - name: antibiotic
    description: >
      처방(prescriptions)에서 항생제만 추출하고 starttime이 속한 ICU 재실(stay_id)을
      붙인다. suspicion_of_infection(감염 의심)의 입력이다.
      출처: mimic-code concepts/medication/antibiotic.sql (BigQuery → Trino 포팅)
    columns:
      - name: subject_id
        description: 환자 고유 식별자
      - name: hadm_id
        description: 병원 입원 고유 식별자
      - name: stay_id
        description: ICU 체류 고유 식별자 (starttime 기준 매칭)
      - name: antibiotic
        description: 항생제명 (prescriptions.drug)
      - name: route
        description: 투여 경로
      - name: starttime
        description: 처방 시작 시각
      - name: stoptime
        description: 처방 종료 시각

  - name: urine_output_rate
    description: >
      시간당 소변량(mL/kg/hr)을 체중 정규화로 산출한다.
      urine_output·weight_durations와 icustays·chartevents를 결합해 6/12/24시간 누적
      소변량을 체중·시간으로 정규화한다. SOFA 신장 점수의 입력이다.
      출처: mimic-code concepts/measurement/urine_output_rate.sql (BigQuery → Trino 포팅)
    columns:
      - name: stay_id
        description: ICU 체류 고유 식별자
      - name: charttime
        description: 관찰 시각 — grain
      - name: weight
        description: 체중(kg, weight_durations 매칭)
      - name: uo
        description: 해당 시각 소변량
      - name: urineoutput_6hr
        description: 직전 6시간 누적 소변량(mL)
      - name: urineoutput_12hr
        description: 직전 12시간 누적 소변량(mL)
      - name: urineoutput_24hr
        description: 직전 24시간 누적 소변량(mL)
      - name: uo_mlkghr_6hr
        description: 직전 6시간 시간당 소변량(mL/kg/hr)
      - name: uo_mlkghr_12hr
        description: 직전 12시간 시간당 소변량(mL/kg/hr)
      - name: uo_mlkghr_24hr
        description: 직전 24시간 시간당 소변량(mL/kg/hr)
      - name: uo_tm_6hr
        description: 6시간 윈도우 실제 관측 시간(hr)
      - name: uo_tm_12hr
        description: 12시간 윈도우 실제 관측 시간(hr)
      - name: uo_tm_24hr
        description: 24시간 윈도우 실제 관측 시간(hr)

  - name: sofa
    description: >
      ICU 재실 매시간 격자에서 6개 장기(호흡·응고·간·심혈관·신경·신장) SOFA 점수를
      산출하고 24시간 롤링 윈도우 최대값으로 합산해 sofa_24hours(0~24)를 만든다.
      bg·vitalsign·gcs·ventilation·검사·바소프레서·urine_output_rate를 ref로 소비한다.
      Sepsis-3 판정의 입력이다.
      출처: mimic-code concepts/score/sofa.sql (BigQuery → Trino 포팅)
    columns:
      - name: stay_id
        description: ICU 체류 고유 식별자
      - name: hr
        description: 입실 기준 시간 오프셋(icustay_hourly 격자)
      - name: hadm_id
        description: 병원 입원 고유 식별자
      - name: starttime
        description: 해당 시간 구간 시작 시각
      - name: endtime
        description: 해당 시간 구간 종료 시각
      - name: respiration_24hours
        description: 24시간 호흡 SOFA 점수(0~4)
      - name: coagulation_24hours
        description: 24시간 응고 SOFA 점수(0~4)
      - name: liver_24hours
        description: 24시간 간 SOFA 점수(0~4)
      - name: cardiovascular_24hours
        description: 24시간 심혈관 SOFA 점수(0~4)
      - name: cns_24hours
        description: 24시간 신경(CNS) SOFA 점수(0~4)
      - name: renal_24hours
        description: 24시간 신장 SOFA 점수(0~4)
      - name: sofa_24hours
        description: 24시간 SOFA 총점(0~24, 6개 장기 합)

  - name: suspicion_of_infection
    description: >
      항생제 처방과 미생물 배양 검사를 시간 근접성(배양 후 72시간 / 항생제 전 24시간)으로
      매칭해 감염 의심 여부·시각·검체·양성 여부를 판정한다. antibiotic을 ref로,
      microbiologyevents를 source로 소비한다. Sepsis-3 판정의 입력이다.
      출처: mimic-code concepts/sepsis/suspicion_of_infection.sql (BigQuery → Trino 포팅)
    columns:
      - name: subject_id
        description: 환자 고유 식별자
      - name: stay_id
        description: ICU 체류 고유 식별자
      - name: hadm_id
        description: 병원 입원 고유 식별자
      - name: ab_id
        description: 항생제 처방 행 식별자
      - name: antibiotic
        description: 항생제명
      - name: antibiotic_time
        description: 항생제 투여 시각
      - name: suspected_infection
        description: 감염 의심 여부(1=의심)
      - name: suspected_infection_time
        description: 감염 의심 판정 시각
      - name: culture_time
        description: 배양 검사 시각
      - name: specimen
        description: 배양 검체 종류
      - name: positive_culture
        description: 배양 양성 여부(1=양성)

  - name: sepsis3
    description: >
      ICU 내 Sepsis-3 발현(onset) 시각. SOFA>=2 이면서 감염 의심이 있는 가장 이른 시점을
      stay_id별 1건으로 산출한다(감염 의심 시각 기준 -48h~+24h 윈도우의 SOFA와 결합).
      sofa·suspicion_of_infection을 ref로 소비하며, sepsis_mortality 라벨의 기반이다.
      출처: mimic-code concepts/sepsis/sepsis3.sql (BigQuery → Trino 포팅)
    columns:
      - name: subject_id
        description: 환자 고유 식별자
      - name: stay_id
        description: ICU 체류 고유 식별자
      - name: antibiotic_time
        description: 항생제 투여 시각
      - name: culture_time
        description: 배양 검사 시각
      - name: suspected_infection_time
        description: 감염 의심 판정 시각
      - name: sofa_time
        description: 결합된 SOFA 행의 종료 시각
      - name: sofa_score
        description: 해당 시점 SOFA 총점
      - name: respiration
        description: 호흡 SOFA 점수
      - name: coagulation
        description: 응고 SOFA 점수
      - name: liver
        description: 간 SOFA 점수
      - name: cardiovascular
        description: 심혈관 SOFA 점수
      - name: cns
        description: 신경(CNS) SOFA 점수
      - name: renal
        description: 신장 SOFA 점수
      - name: sepsis3
        description: Sepsis-3 충족 여부(SOFA>=2 AND 감염 의심)
