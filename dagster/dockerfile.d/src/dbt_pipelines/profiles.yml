# dbt-trino 프로파일: Trino를 통해 Iceberg(JDBC 카탈로그) 레이크하우스에 적재
# database = Trino 카탈로그명(iceberg.properties의 catalog-name과 일치), schema = Trino 스키마
dbt_pipelines:
  outputs:
    dev:
      type: trino
      method: none # dev 환경: 인증 없음
      user: dagster
      host: trino
      port: 8080
      http_scheme: http
      database: iceberg # Trino 카탈로그 (= iceberg.properties catalog-name)
      schema: dev # Trino 스키마 (없으면 dbt가 생성)
      threads: 4

    prod:
      type: trino
      method: none
      user: dagster
      host: trino
      port: 8080
      http_scheme: http
      database: iceberg
      schema: prod
      threads: 8

  target: dev
