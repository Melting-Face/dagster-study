dbt_pipelines:
  outputs:
    dev:
      type: duckdb
      path: /shared/dev.duckdb
      filesystems:
        - fs: s3
          anon: false
          key: "{{ env_var('AWS_ACCESS_KEY_ID') }}"
          secret: "{{ env_var('AWS_SECRET_ACCESS_KEY') }}"
          client_kwargs:
            endpoint_url: "{{ env_var('ENDPOINT_URL') }}"
      threads: 1

    prod:
      type: duckdb
      path: /shared/prod.duckdb
      filesystems:
        - fs: s3
          anon: false
          key: "{{ env_var('AWS_ACCESS_KEY_ID') }}"
          secret: "{{ env_var('AWS_SECRET_ACCESS_KEY') }}"
          client_kwargs:
            endpoint_url: "{{ env_var('ENDPOINT_URL') }}"
      threads: 4

  target: dev
