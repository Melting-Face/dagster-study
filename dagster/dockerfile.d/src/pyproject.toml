[project]
name = "dagster_project"
requires-python = ">=3.10,<3.15"
version = "0.1.0"
dependencies = [
  "beautifulsoup4==4.13.3",
  "requests==2.32.5",
  "xlsx2csv==0.8.4",
  "openpyxl==3.1.5",
  "s3fs==2026.1.0",
  "dagster==1.12.12",
  "dagster-webserver==1.12.12",
  "dagster-graphql==1.12.12",
  "dagster-postgres==0.28.12",
  "dagster-dbt==0.28.12",
  # DuckDB 대체: Trino 어댑터 (버전은 dbt-core 1.10 호환성 빌드 시 재확인 필요)
  "dbt-trino>=1.8,<2.0",
  "dagster-dg-cli==1.12.12",
]

[dependency-groups]
dev = [
  "dagster-webserver",
  "pytest",
  "ruff",
  "sqlfluff",
  "sqlfluff-templater-dbt",
  "gitlint",
  "yamllint",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
force-include = { "pyproject.toml" = "pyproject.toml" }

[tool.dg]
directory_type = "project"

[tool.dg.project]
root_module = "dagster_project"
registry_modules = ["dagster_project.components.*"]

# --- Python 린터/포매터: ruff ---
[tool.ruff]
line-length = 88
indent-width = 4
target-version = "py310"

[tool.ruff.lint]
# pycodestyle(E), pyflakes(F), isort(I), pyupgrade(UP), bugbear(B), pydocstyle(D)
select = ["E", "F", "I", "UP", "B", "D"]
# 모듈(D100)·패키지(D104) docstring은 강제하지 않음
ignore = ["D100", "D104"]

# docstring 컨벤션: Google 스타일
[tool.ruff.lint.pydocstyle]
convention = "google"

[tool.ruff.format]
indent-style = "space"

# --- SQL 린터/포매터: sqlfluff (dbt-trino) ---
[tool.sqlfluff.core]
templater = "dbt"
dialect = "trino"
max_line_length = 88

[tool.sqlfluff.indentation]
tab_space_size = 4

[tool.sqlfluff.rules.capitalisation.keywords]
capitalisation_policy = "lower"

# --- 커밋 메시지 린터: gitlint ---
[tool.gitlint]
# 짧은 커밋엔 본문이 없을 수 있어 허용
ignore = "body-is-missing"

[tool.gitlint.rules.title-max-length]
line-length = 72

[tool.gitlint.rules.title-match-regex]
# 커밋 컨벤션: "type: 설명" (type = feat|fix|mod|add|del|docs|refactor|test)
regex = "^(feat|fix|mod|add|del|docs|refactor|test): .+"
