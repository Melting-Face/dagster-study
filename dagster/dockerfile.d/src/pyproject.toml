[project]
name = "dagster_project"
requires-python = ">=3.10,<3.15"
version = "0.1.0"
dependencies = [
  "beautifulsoup4==4.13.3",
  "requests==2.32.5",
  "xlsx2csv==0.8.4",
  "openpyxl==3.1.5",
  "s3fs==2026.1.0",
  "dagster==1.12.12",
  "dagster-webserver==1.12.12",
  "dagster-graphql==1.12.12",
  "dagster-postgres==0.28.12",
  "dagster-dbt==0.28.12",
  # DuckDB 대체: Trino 어댑터 (버전은 dbt-core 1.10 호환성 빌드 시 재확인 필요)
  "dbt-trino>=1.8,<2.0",
  "dagster-deltalake==0.28.12",
  "dagster-deltalake-polars==0.28.12",
  "dagster-polars[patito]==0.27.8",
  "dagster-dg-cli==1.12.12",
  "dagster-apprise==0.0.2",
  "dagster-mlflow==0.28.12",
]

[dependency-groups]
dev = ["dagster-webserver", "pytest"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
force-include = { "pyproject.toml" = "pyproject.toml" }

[tool.dg]
directory_type = "project"

[tool.dg.project]
root_module = "dagster_project"
registry_modules = ["dagster_project.components.*"]
