x-docker-logging: &docker-logging
  logging:
    driver: "json-file"
    options:
      max-size: "10m" # 로그 파일의 최대 크기 (10MB)
      max-file: "20" # 유지할 로그 파일 개수 (최대 10개)

services:
  dagster-dev:
    <<: *docker-logging
    container_name: dagster-dev
    build:
      context: dagster/dockerfile.d/
    command:
      - "dev"
      - "-h"
      - "0.0.0.0"
      - "--verbose"
    env_file:
      - .env
    ports:
      - ${DAGSTER_PORT}:${DAGSTER_PORT}
    volumes:
      - ./shared:/shared
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    <<: *docker-logging
    container_name: postgres
    image: postgres:15
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 8s
      retries: 5

  mlflow:
    <<: *docker-logging
    container_name: mlflow
    image: ghcr.io/mlflow/mlflow:${MLFLOW_VERSION}
    ports:
      - ${MLFLOW_PORT}:${MLFLOW_PORT}
    command:
      - /bin/bash
      - -c
      - |
        pip install --no-cache-dir psycopg2-binary boto3
        mlflow server \
          --backend-store-uri "${MLFLOW_BACKEND_STORE_URI}" \
          --artifacts-destination "${MLFLOW_ARTIFACTS_DESTINATION}" \
          --serve-artifacts \
          --host "${MLFLOW_HOST}" \
          --port "${MLFLOW_PORT}"
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy

  ollma:
    <<: *docker-logging
    container_name: ollma
    image: ollama/ollama:${OLLMA_VERSION}
    ports:
      - ${OLLMA_PORT}:${OLLMA_PORT}
    volumes:
      - ./ollma:/root/.ollma:Z,U

  rustfs:
    <<: *docker-logging
    container_name: rustfs
    image: rustfs/rustfs:1.0.0-alpha.83
    ports:
      - 9000-9001:9000-9001
    volumes:
      - ./rustfs/data:/data:Z,U

