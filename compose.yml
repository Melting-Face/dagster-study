---
name: dagster

x-docker-logging: &docker-logging
  logging:
    driver: "json-file"
    options:
      # 로그 파일의 최대 크기 (10MB)
      max-size: "10m"
      # 유지할 로그 파일 개수 (최대 10개)
      max-file: "20"

services:
  dagster-dev:
    <<: *docker-logging
    container_name: dagster-dev
    build:
      context: dagster/dockerfile.d/
    command:
      - "dev"
      - "-h"
      - "0.0.0.0"
      - "--verbose"
    environment:
      - DAGSTER_POSTGRES_USER=${DAGSTER_POSTGRES_USER}
      - DAGSTER_POSTGRES_PASSWORD=${DAGSTER_POSTGRES_PASSWORD}
      - DAGSTER_POSTGRES_DB=${DAGSTER_POSTGRES_DB}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - ENDPOINT_URL=${ENDPOINT_URL}
    ports:
      - ${DAGSTER_PORT}:${DAGSTER_PORT}
    volumes:
      - ./shared:/shared
    depends_on:
      postgres:
        condition: service_healthy
  postgres:
    <<: *docker-logging
    container_name: postgres
    image: postgres:15
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
      # - ./initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 8s
      retries: 5
  trino:
    <<: *docker-logging
    container_name: trino
    image: trinodb/trino:468
    ports:
      - "8080:8080"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    volumes:
      # 카탈로그 정의만 읽기전용 마운트 (비밀정보는 ${ENV:..}로 치환)
      - ./trino/etc/catalog:/etc/trino/catalog:ro
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/v1/info"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2G
  # SeaweedFS standalone: master/volume/filer/s3를 단일 컨테이너로 통합
  seaweedfs:
    <<: *docker-logging
    container_name: seaweedfs
    image: chrislusf/seaweedfs # use a remote image
    ports:
      - 9333:9333 # master UI
      - 8333:8333 # S3 API
      - 8888:8888 # filer UI
      # volume(8080)·grpc·metrics(9324)는 컨테이너 네트워크 내부 통신만 사용 → host 미게시 (Trino 8080 충돌 회피)
    command: "server -ip=seaweedfs -ip.bind=0.0.0.0 -dir=/data -filer -s3 -metricsPort=9324"
    volumes:
      - ./seaweedfs/data:/data
  discord-bot:
    <<: *docker-logging
    container_name: discord-bot
    build:
      context: discord-py/dockerfile.d/
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      # Ollama Cloud(ollama.com) 연동 설정
      - OLLAMA_HOST=${OLLAMA_HOST}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY}
      - OLLAMA_MODEL=${OLLAMA_MODEL}
    restart: unless-stopped
  prometheus:
    image: prom/prometheus:v2.21.0
    ports:
      - 9000:9090
    volumes:
      - ./prometheus:/etc/prometheus
    command: "--web.enable-lifecycle --config.file=/etc/prometheus/prometheus.yml"
    depends_on:
      - seaweedfs
